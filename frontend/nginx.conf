server {
    listen 80;
    server_name metrics.smcindiaonline.org metrics.smcindiaonline.com 10.10.0.209;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name metrics.smcindiaonline.org metrics.smcindiaonline.com 10.10.0.209;

    ssl_certificate /etc/nginx/ssl/wildcard_smcindiaonline_org-Bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/wildcard_smcindiaonline_org.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_cache_bypass $http_upgrade;
    }
}
